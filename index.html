<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- App name & identity -->
  <title>Player</title>
  <meta name="application-name" content="Player" />
  <meta name="apple-mobile-web-app-title" content="Player" />
  <meta name="description" content="Learn piano from sheet music with real-time MIDI keyboard support, practice mode, and visual aids." />

  <!-- PWA / homescreen -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Theme -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="dark light" />
  <meta name="msapplication-TileColor" content="#0f172a" />

  <!-- Compatibility -->
  <meta name="format-detection" content="telephone=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Open Graph (link sharing) -->
  <meta property="og:title" content="Player" />
  <meta property="og:description" content="Learn piano from sheet music with real-time MIDI keyboard support." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://play.everla.st" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>" />
</head>
<body>
  <div id="app">
    <div id="toolbar-container"></div>
    <div id="library-container"></div>
    <div id="score-container"></div>
    <div id="note-display-container"></div>
    <div id="keyboard-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
